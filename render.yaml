services:
  - type: web
    name: peakvalley-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
      - key: DASHSCOPE_API_KEY
        value: placeholder-get-later
      - key: JWT_SECRET
        sync: false
      - key: DEBUG
        value: "false"
      - key: REDIS_URL
        value: https://your-redis.upstash.io
      - key: REDIS_TOKEN
        value: your-upstash-token
